<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Orquestracs</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">
    <div class="background-elements hide-on-print">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-panel login-panel">
            <div class="login-header">
                <div class="logo-wrapper" style="justify-content: center; margin-bottom: 0.5rem;">
                    <div class="logo-circle" style="width: 40px; height: 40px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <div style="width: 18px; height: 18px; background: rgba(15, 20, 25, 1); border-radius: 50%;"></div>
                    </div>
                    <h1 class="logo-text-brand" style="font-size: 2.5rem; color: #fff; font-family: var(--font-heading); font-weight: 800; letter-spacing: -1px; margin-left: 5px;">rquestracs</h1>
                </div>
                <span style="color: var(--accent-color); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Sistemas Integrados</span>
                <p style="margin-top: 1.5rem;">Acesse o Sistema de Gestão</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">E-mail de Acesso</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" required placeholder="admin@orquestracs.com.br">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha <span class="badge">(Será salva no 1º acesso)</span></label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" required placeholder="Sua senha segura">
                    </div>
                </div>

                <div id="loginError" class="error-msg" style="display: none;">
                    Senha incorreta. Tente novamente.
                </div>

                <button type="submit" class="btn-primary login-btn">
                    Entrar no Sistema <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
